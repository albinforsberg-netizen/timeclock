name: Update README time stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"
  push:
    paths:
      - "timelog-work"
      - "scripts/generate_readme_stats.py"
      - ".github/workflows/update-readme-stats.yml"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate README stats
        run: python3 scripts/generate_readme_stats.py

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update README time stats"
          file_pattern: README.md
